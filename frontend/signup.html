<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RailNova | Sign Up</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="toast.css">
<link rel="stylesheet" href="signup.css">

</head>

<body>

<div class="container">

<div class="left">

<h1>🚆 RailNova</h1>

<h2>Join RailNova Today</h2>

<p>

    Join thousands of travellers using RailNova for a smarter,
    faster and hassle-free railway experience.
    
    </p>
    
    <div class="signup-features">
    
        <div>✔ Instant Ticket Booking</div>
    
        <div>✔ Live Train Tracking</div>
    
        <div>✔ PNR Status Updates</div>
    
        <div>✔ Safe & Secure Login</div>
    
    </div>

</div>

<div class="right">

<form id="signupForm">

<h2>Create Account</h2>

<input type="text" id="name" placeholder="Full Name" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">

Create Account

</button>

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</form>

</div>

</div>
<script src="toast.js"></script>
<script src="signup.js"></script>

</body>

</html>
